<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Explore Downtown Toronto</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

    <header>
        <img src="./assets/person.png"
        <strong>Toronto Walks</strong>
    </header>
    <div class="container">
        <aside id="info">
            <h2>Welcome to <i>Toronto Walks</i></h2>
            <p>Choose a walking route to follow, or click or tap on any map marker to learn more.</p>
        </aside>
        <main id="map"></main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-ajax/2.1.0/leaflet.ajax.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.min.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
