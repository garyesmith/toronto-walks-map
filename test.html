<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Split Layout</title>
    <style>
        /* Basic Reset and Modern Sans-Serif Font */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents scrollbars on the body */
        }

        /* Header Bar */
        header {
            height: 50px;
            min-height: 50px;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Main Container */
        .container {
            display: flex;
            flex: 1; /* Fills remaining height below header */
            transition: all 0.5s ease-in-out;
        }

        /* Information Div */
        .info {
            background-color: #f4f4f9;
            padding: 20px;
            transition: all 0.5s ease-in-out;
            overflow-y: auto;
            border-right: 1px solid #ddd;
        }

        /* Main Content Div */
        .content {
            background-color: #ffffff;
            padding: 20px;
            transition: all 0.5s ease-in-out;
            overflow-y: auto;
        }

        /* DESKTOP VIEW (Default) */
        @media (min-width: 769px) {
            .container {
                flex-direction: row;
            }
            .info {
                width: 25%;
                height: 100%;
            }
            .content {
                width: 75%;
                height: 100%;
            }
        }

        /* MOBILE/TABLET VIEW */
        @media (max-width: 768px) {
            .container {
                /* column-reverse puts content on top and info on bottom */
                flex-direction: column-reverse;
            }
            .info {
                width: 100%;
                height: 50%;
                border-right: none;
                border-top: 1px solid #ddd;
            }
            .content {
                width: 100%;
                height: 50%;
            }
        }

        /* Visual styling for demo purposes */
        h2 { margin-bottom: 15px; font-size: 1.2rem; color: #333; }
        p { line-height: 1.6; color: #666; }
    </style>
</head>
<body>

    <header>
        <strong>My Website</strong>
    </header>

    <div class="container">
        <aside class="info">
            <h2>Information</h2>
            <p>This is the 25% width sidebar on desktop, and the bottom 50% panel on mobile.</p>
        </aside>

        <main class="content">
            <h2>Main Content</h2>
            <p>This is the 75% width main area on desktop, and the top 50% panel on mobile.</p>
            <p>The layout transitions smoothly when the window is resized.</p>
        </main>
    </div>

</body>
</html>
