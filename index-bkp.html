<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Explore Downtown Toronto</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --header-height: 60px;
            --info-height: 33%;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent body scroll, use flex containers instead */
        }

        /* Main Flexbox Container */
        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Title Styling */
        header {
            height: var(--header-height);
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Map Area - Grows to fill space */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }

        /* Information Window below map */
        #info-window {
            height: var(--info-height);
            background: white;
            border-top: 3px solid var(--accent-color);
            padding: 15px;
            overflow-y: auto;
            box-sizing: border-box;
            font-size: 0.9rem;
            line-height: 1.4;
            color: #333;
        }

        #info-window h2 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.1rem;
            color: var(--accent-color);
        }

        #info-window img {
            max-width: 25%;
            width: 25%;
            height: auto;
            float: left;
            margin: 0 2% 2% 0;
            border: 1px solid black;
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 600px) {
            :root {
                --header-height: 50px;
                --info-height: 150px;
            }
            header h1 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Explore Downtown Toronto</h1>
        </header>

        <div id="map"></div>

        <div id="info-window">
            <div id="details">
                <h2>Feature Info</h2>
                <p>Click or tap a feature on the map to see its details here.</p>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-ajax/2.1.0/leaflet.ajax.min.js"></script>
    <script>

        // init map and zoom
        const map = L.map('map',{
            preferCanvas: true,
            center: [43.6425099,-79.3745239],
            zoom: 13
        });

        // add base tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // reference to info panel div
        const infoDiv = document.getElementById('details');


        // 5. Load GeoJSON using Leaflet-AJAX
        const geoJson = [
          ["./green_spaces.json", "#adc57b", 1, 1, false],
          ["./sidewalks.json", "#999999", 1, 2, false],
          ["./water.json", "#91cbef", 1, 3, false],
          ["./buildings.json", "#d0b38f", 1, 4, false],
          ["./subway.geojson", "#444444", 4, 5, false],
          ["./sights.geojson", "#FFEA00", 1, 6, true]
        ];

        var layers=[];

        for (let i = 0; i < geoJson.length; i++) {
            map.createPane('pane'+i);
            map.getPane('pane'+i).style.zIndex = 500+geoJson[i][3];
            layers[i] = new L.GeoJSON.AJAX(geoJson[i][0], {
            style: function(feature) {
                    return {
                        color: geoJson[i][1],
                        weight: geoJson[i][2],
                        fillOpacity: 0.5
                    };
                },
                pane: 'pane'+i
            });
            layers[i].addTo(map);
            layers[i].on('click', function(e) {
                sightClicked(e.layer.feature.properties, e);
            });
        }
          
        function sightClicked(props, e) {

            console.log(props);
            let html = `<h2>${props['SightName']}</h2>`;
            html += `<p><img src="./images/${props['SightImage']}" alt="${props['SightName']}" /></p>`;
            html += `<p>${props['SightDesc']}</p>`;
            
            infoDiv.innerHTML = html;

            // Highlight selection
            layers[5].setStyle({ fillColor: "#FFEA00", color: "#FFEA00", weight: 1 }); // Reset others
            e.target.setStyle({ fillColor: "#FFEA00", color: "#FFA500", weight: 3 }); // Highlight this one
            
            // Zoom to feature (optional, good for mobile)
            map.fitBounds(e.target.getBounds(), { padding: [20, 20] });
        }

        // Resize fix for mobile browser address bars
        window.addEventListener('resize', () => {
            map.invalidateSize();
        });

        function onLocationFound(e) {
            var radius = e.accuracy / 2;
            //L.marker(e.latlng).addTo(map)
                //.bindPopup("You are within " + radius + " meters from this point").openPopup();
            L.circle(e.latlng, radius).addTo(map);
        }
        map.on('locationfound', onLocationFound);
        map.locate();

    </script>
</body>
</html>
